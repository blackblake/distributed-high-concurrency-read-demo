services:
  redis:
    image: redis:7.4-alpine
    container_name: hw1-redis
    ports:
      - "6380:6379"
    networks: [hw1]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql-master:
    image: mysql:8.4
    container_name: hw1-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hw1
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3307:3306"
    networks: [hw1]
    volumes:
      - ./docker/mysql/master/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/master/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql-slave:
    build:
      context: ./docker/mysql/slave
    container_name: hw1-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    networks: [hw1]
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka:
    image: bitnami/kafka:3.8
    container_name: hw1-kafka
    ports:
      - "9092:9092"
    networks: [hw1]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: hw1-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    networks: [hw1]
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  app-1:
    build:
      context: .
      dockerfile: service/Dockerfile
    container_name: hw1-app-1
    ports:
      - "8081:8080"
    networks: [hw1]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
      APP_INSTANCE_ID: app-1
      APP_SNOWFLAKE_WORKER_ID: "1"
      APP_SNOWFLAKE_DATACENTER_ID: "1"
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      APP_DATASOURCE_MASTER_JDBC_URL: jdbc:mysql://mysql-master:3306/hw1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      APP_DATASOURCE_SLAVE_JDBC_URL: jdbc:mysql://mysql-slave:3306/hw1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy

  app-2:
    build:
      context: .
      dockerfile: service/Dockerfile
    container_name: hw1-app-2
    ports:
      - "8082:8080"
    networks: [hw1]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
      APP_INSTANCE_ID: app-2
      APP_SNOWFLAKE_WORKER_ID: "2"
      APP_SNOWFLAKE_DATACENTER_ID: "1"
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      APP_DATASOURCE_MASTER_JDBC_URL: jdbc:mysql://mysql-master:3306/hw1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      APP_DATASOURCE_SLAVE_JDBC_URL: jdbc:mysql://mysql-slave:3306/hw1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: hw1-gateway
    ports:
      - "9000:9000"
    networks: [hw1]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: hw1-nginx
    ports:
      - "80:80"
    networks: [hw1]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - app-1
      - app-2

networks:
  hw1:
    driver: bridge
