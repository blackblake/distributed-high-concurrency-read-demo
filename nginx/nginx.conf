worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/javascript application/json;

    log_format main '$remote_addr - $upstream_addr [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ---------- Load balancing algorithm ----------
    # Default: round_robin. Swap `least_conn;` or `ip_hash;` to try different strategies.
    # Weighted round-robin example: `server app-1:8080 weight=2;`
    upstream hw1_backend {
        # least_conn;          # uncomment to use least-connections
        # ip_hash;             # uncomment to use ip-hash (session affinity)
        server app-1:8080 max_fails=3 fail_timeout=10s;
        server app-2:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ---------- Static assets (动静分离) ----------
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
            expires 5m;
        }

        location ~* \.(?:html)$ {
            try_files $uri =404;
            expires 5m;
            add_header Cache-Control "public, max-age=300";
        }

        location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            try_files $uri =404;
            expires 7d;
            access_log off;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ---------- Dynamic API proxy ----------
        location /api/ {
            proxy_pass         http://hw1_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 2s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
            # Surface the backend instance id in the response for verifying LB
            add_header X-Upstream-Addr $upstream_addr;
        }

        location /actuator/ {
            proxy_pass http://hw1_backend;
        }
    }
}
