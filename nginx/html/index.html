<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>HW1 · 分布式秒杀 Demo</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header>
    <h1>分布式高并发读 Demo</h1>
    <p class="sub">静态由 Nginx 直接返回；API 由 Nginx 反向代理到 app-1 / app-2（80 → 8081 / 8082）。</p>
</header>

<main>
    <section class="card">
        <h2>商品详情（缓存 Cache-Aside）</h2>
        <div class="row">
            <label>商品 ID：<input id="productId" type="number" value="1"/></label>
            <button id="btnQuery">查询</button>
            <button id="btnWarm">预热</button>
        </div>
        <pre id="productOutput">...</pre>
    </section>

    <section class="card">
        <h2>秒杀下单（Redis 预扣 + Kafka 异步）</h2>
        <div class="row">
            <label>用户 ID：<input id="userId" type="number" value="1001"/></label>
            <label>商品 ID：<input id="skProductId" type="number" value="1"/></label>
            <button id="btnSeckill">发起秒杀</button>
        </div>
        <pre id="seckillOutput">...</pre>
    </section>

    <section class="card">
        <h2>订单查询</h2>
        <div class="row">
            <label>订单 ID：<input id="orderId" type="text" placeholder="snowflake id"/></label>
            <button id="btnOrderById">按订单 ID 查询</button>
            <label>用户 ID：<input id="orderUserId" type="number" value="1001"/></label>
            <button id="btnOrderByUser">按用户查询</button>
        </div>
        <pre id="orderOutput">...</pre>
    </section>
</main>

<footer>
    <small>响应头 <code>X-Upstream-Addr</code> 将显示后端实例，便于验证负载均衡。</small>
</footer>

<script src="/js/app.js"></script>
</body>
</html>
