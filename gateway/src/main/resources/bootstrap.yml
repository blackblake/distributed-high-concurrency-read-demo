spring:
  application:
    name: hw1-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_SERVER_ADDR:nacos:8848}
      config:
        server-addr: ${SPRING_CLOUD_NACOS_SERVER_ADDR:nacos:8848}
        file-extension: yaml
  config:
    import:
      - optional:nacos:hw1-gateway.yaml

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
